<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>『ほつまつたゑ』暗唱支援システム</title>

    <link rel="stylesheet" href="./style.css?v=3">
</head>

<body>

    <h1>
        『ほつまつたゑ』暗唱支援システム
        <span class="version">v1.0</span>
    </h1>

    <select id="ayaSelect"></select>

    <textarea
        id="inputText"
        placeholder="ここに暗唱入力"
    ></textarea>

    <div class="button-row">
        <button id="checkButton" type="button">
            判定
        </button>

        <button id="clearButton" type="button">
            クリア
        </button>
    </div>

    <div id="status"></div>

    <div id="positionInfo"></div>

    <h2>判定結果</h2>

    <div id="userResult" class="result"></div>

    <script src="./app.js?v=3"></script>

</body>
</html>
