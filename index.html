<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ほつま暗記支援</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#efe4c8">

  <link rel="icon" href="icons/hotsuma.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>ほつま暗記支援</h1>

  <select id="ayaSelect"></select>

  <textarea
    id="inputText"
    placeholder="ここに暗唱入力"
  ></textarea>

  <button id="checkButton" type="button">判定する</button>

  <div id="status"></div>
  <div id="positionInfo"></div>

  <h2>あなた</h2>

  <div id="userResult" class="result"></div>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>

</body>
</html>
