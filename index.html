<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>『ほつまつたゑ』暗唱支援システム</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#efe4c8">

  <link rel="icon" href="./icons/hotsuma-icon-192.png">
  <link rel="apple-touch-icon" href="./icons/hotsuma-icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ほつま暗唱">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./style.css?v=2">
</head>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log('Service Worker registered'))
      .catch(error => console.log('Service Worker registration failed:', error));
  });
}
</script>

<body>

  <h1>
    『ほつまつたゑ』暗唱支援システム
    <span class="version">v1.0</span>
  </h1>

  <select id="ayaSelect"></select>

  <textarea
    id="inputText"
    placeholder="ここに暗唱入力"
  ></textarea>

 <div id="textArea"></div>

  <button id="checkButton" type="button">判定する</button>

  <div id="status"></div>
  <div id="positionInfo"></div>

  <h2>あなた</h2>

  <div id="userResult" class="result"></div>

  <script src="./app.js?v=2"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>

</body>
</html>
